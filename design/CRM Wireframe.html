<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nova Trade CRM — Wireframe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="wire.css" />
<style>
  /* splash while React mounts */
  #boot { position: fixed; inset: 0; display: grid; place-items: center; background: var(--paper); color: var(--ink-3); font-family: var(--mono); font-size: 12px; z-index: 1; }
</style>
</head>
<body data-density="regular" data-annotations="on" data-sidebar="open">
  <div id="root"></div>
  <div id="boot">loading wireframe…</div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="widgets.jsx"></script>
  <script type="text/babel" src="screen-dashboard.jsx"></script>
  <script type="text/babel" src="screen-clients.jsx"></script>
  <script type="text/babel" src="screen-invoices.jsx"></script>
  <script type="text/babel" src="screen-products.jsx"></script>
  <script type="text/babel" src="screen-shipping.jsx"></script>
  <script type="text/babel" src="screen-work.jsx"></script>
  <script type="text/babel" src="screen-projects.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    // remove splash once mounted
    const _obs = setInterval(() => {
      if (document.querySelector(".app")) { document.getElementById("boot")?.remove(); clearInterval(_obs); }
    }, 100);
  </script>
</body>
</html>
